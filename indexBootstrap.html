<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="sidebar.css">
    <!-- Basic Icons -->
	  <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
	  <!-- Filled Icons -->
	  <link href="https://cdn.boxicons.com/3.0.8/fonts/filled/boxicons-filled.min.css" rel="stylesheet">
	  <!-- Brand Icons -->
	  <link href="https://cdn.boxicons.com/3.0.8/fonts/brands/boxicons-brands.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>

    <style>
		#map {
			width: 100vw;
			height: 100vh;
		}
    </style>
  </head>

  <body>
    <div class="container-fluid" >
      <div class="row" style="position: fixed;">
        <iframe id="map" src="leaflet.html"></iframe>
       <div class="md-block gap-1 d-md-flex justify-content-md-end" style="position: absolute; right: 10% ; top: 1.2%;" >
          <button id="cambioVist" class="btn btn-primary" type="button">3D</button>
        </div>
        <script>
          var camB = document.getElementById('cambioVist');
          var vistMap = document.getElementById('map');

          camB.addEventListener("click", () => {
           if(camB.textContent=="3D"){
             camB.textContent = "2D";
            vistMap.src= "cesium.html";
            }else{
              camB.textContent = "3D"
              vistMap.src= "leaflet.html";
           }
           });
        </script>
      </div>
    </div>
	
    <div>
		<header>
			<aside class="sidebar">
				<header>
					<div class="image-text">
						<div class="text header-text">
							<span class="name">Universidad Autonoma De Zacatecas Siglo XII  </span>
						</div>
						<span class="image">
							<img src="uaz.png" alt="">
						</span>
					</div>
					<i class="bx bx-chevron-left-circle toggle"> </i>
				</header>
        <div class= "menu-bar">
            <div class="menu">
                <li class="search-box">
                  <i class="bx bx-compass icon"></i>
                  <input type="search" id="buscador" placeholder="Buscar">
                </li>
            </div>
        </div>
        <div class="accordion" id="accordion">
         <div class="accordion-item">
            <h2 class="accordion-header">
            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flush-collapseOne" aria-expanded="false" aria-controls="flush-collapseOne">
             Accordion Item #1
            </button>
            </h2>
         <div id="flush-collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionFlushExample">
            <div class="accordion-body">Placeholder content for this accordion, which is intended to demonstrate the <code>.accordion-flush</code> class. This is the first item’s accordion body.</div>
            </div>
          </div>
        </div>
        <!--ul class="build-list" id="build-list">
        </ul--> 
        <script>
            const input = document.getElementById("buscador");
            const lista = document.getElementById("build-list");
            const items = lista.getElementsByTagName("li");

              input.addEventListener("keyup", function() {
                const filtro = input.value.toLowerCase();

                for (let i = 0; i < items.length; i++) {
                    const texto = items[i].textContent.toLowerCase();

                    if (texto.includes(filtro)) {
                        items[i].style.display = "";
                    } else {
                        items[i].style.display = "none";
                    }
                }
            });

            fetch("edificios.php")
            .then(response => response.json())
            .then(data => {

              const ul = document.getElementById("build-list");

              data.features.forEach(edificio => {
              const li = document.createElement("li");
              li.textContent = edificio.properties.NOMBRE;

              ul.appendChild(li);
              });
            });
            
            const body = document.querySelector("body"),
                  sidebar = body.querySelector(".sidebar"),
                  toggle = body.querySelector(".toggle"),
                  searchBtn = body.querySelector(".search-box"),
                  map = document.getElementById("map");


              toggle.addEventListener("click", () =>{
              sidebar.classList.toggle("close");
              //map.style.width = sidebar.classList.contains("close") ? "100vw" : "75vw";
            });
        </script>
			</aside>
		</header>
  </body>
</html>

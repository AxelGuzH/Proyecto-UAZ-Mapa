      var map = L.map('map', {
        center: [22.771495, -102.643982],
        zoom: 16.5
      });

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap',
        subdomains: ['a','b','c']
      }).addTo(map);

      function mouseSobre(e) {
        var layer = e.target;
        layer.setStyle({
          color: '#666'
        });
        layer.bindPopup(
          layer.feature.properties.NOMBRE,
          {closeButton:false}
        ).openPopup();
        layer.bringToFront();
      }

      function mouseFuera(e) {
        var layer = e.target;
        layer.setStyle({
          color: 'blue'
        });
        layer.bindPopup().closePopup();
        layer.bringToFront();
      }

      let edificios = [];

      fetch("edificios.php")
      .then(response => response.json())
      .then(data => {
        L.geoJSON(data, {
          onEachFeature: function(feature, layer){
            let id=feature.properties.ID_EDIFICIO;
            layer.on('mouseover', mouseSobre);
            layer.on('mouseout', mouseFuera);
            edificios[id]=layer;
          },
          color: 'blue'
        }).addTo(map);
        L.popup({closeButton:false});
      });   

    </script>
